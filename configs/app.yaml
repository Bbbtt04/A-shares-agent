environment: paper

paths:
  audit_log: data/audit/app.jsonl
  event_store: data/events
  reports: reports/daily

market:
  max_market_data_delay_ms: 1000
  indexes:
    - 000001.SH
    - 399001.SZ
    - 399006.SZ
    - 000300.SH

premarket:
  news_window: "previous_close_to_auction"
  limit_per_source: null
