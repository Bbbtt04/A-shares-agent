    - tonghuashun
  news_feeds: []
  a_stock_data:
    enabled: true
    symbols:
      - 688981.SH
      - 002371.SZ
      - 688256.SH
      - 601138.SH

watchlist:
  - 510300.SH
  - 159915.SZ

paper_broker:
  initial_cash: 1000000
  commission_bps: 2
  slippage_bps: 3
  fill_model: next_bar
  allow_partial_fill: false

configs:
  risk: configs/risk.paper.yaml
  strategy_registry: configs/strategy_registry.yaml
  watchlist: configs/symbols.watchlist.yaml
  premarket: configs/premarket.yaml
  rag_premarket: configs/rag.premarket.yaml
